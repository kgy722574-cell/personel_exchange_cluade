<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행정정보 통합관리법 · 조문 검색</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="letterpress"></div>

<header class="masthead">
  <div class="masthead__inner">
    <div class="masthead__seal" aria-hidden="true">
      <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="46" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="50" cy="50" r="38" fill="none" stroke="currentColor" stroke-width="1"/>
        <text x="50" y="45" text-anchor="middle" class="seal-text">法</text>
        <text x="50" y="66" text-anchor="middle" class="seal-text-sm">令</text>
      </svg>
    </div>
    <div class="masthead__text">
      <p class="masthead__eyebrow">법률 데이터베이스 · 전문 조회</p>
      <h1 class="masthead__title">행정정보 통합관리법</h1>
      <p class="masthead__meta">전체 15개 조 · 부칙 포함 <span class="dot">·</span> 시행 2026. 7. 1.</p>
    </div>
  </div>

  <div class="search-block">
    <label class="search-block__label" for="search-input">조문 본문 검색</label>
    <div class="search-box">
      <span class="search-box__mark">§</span>
      <input id="search-input" type="text" placeholder="검색할 키워드를 입력하세요 (예: 개인정보, 과태료, 표준)" autocomplete="off">
      <button id="search-clear" class="search-box__clear" type="button" aria-label="검색어 지우기" hidden>&times;</button>
    </div>
  </div>
</header>

<main id="main">

  <section id="results-panel" class="results-panel" hidden>
    <div class="results-panel__summary">
      <span class="results-count"><strong id="result-count">0</strong>건의 조문에서 검색됨</span>
      <span class="results-query">검색어: “<span id="result-query"></span>”</span>
    </div>
    <ul id="results-list" class="results-list"></ul>
  </section>

  <section id="grid-panel" class="grid-panel">
    <div class="grid-panel__label">
      <span class="rule"></span>
      <span>조문 전체 목록</span>
      <span class="rule"></span>
    </div>
    <div id="card-grid" class="card-grid"></div>
  </section>

</main>

<div id="detail-overlay" class="detail-overlay" hidden>
  <div class="detail-page" role="dialog" aria-modal="true" aria-labelledby="detail-title">
    <button id="detail-close" class="detail-close" type="button">
      <span class="detail-close__stamp">닫기</span>
    </button>
    <div class="detail-page__ribbon"></div>
    <p class="detail-eyebrow" id="detail-jo-num"></p>
    <h2 class="detail-title" id="detail-title"></h2>
    <div class="detail-rule"></div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<footer class="footer">
  <p>가상의 법령입니다 · 조항데이터.json 기반으로 생성된 열람용 아카이브</p>
</footer>

<script src="app.js"></script>
</body>
</html>
